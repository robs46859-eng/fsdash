name: Sync Render Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to sync. Leave empty to use the branch default."
        required: false
        type: choice
        options:
          - ""
          - staging
          - production
      dry_run:
        description: "Validate and print changes without calling Render"
        required: true
        default: false
        type: boolean

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      should_sync: ${{ steps.resolve.outputs.should_sync }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - name: Resolve target environment
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_ENV: ${{ github.event.inputs.target_environment || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_ENV=""
          SHOULD_SYNC="false"
          DRY_RUN="false"

          if [ "$EVENT_NAME" = "push" ]; then
            if [ "$REF_NAME" != "main" ]; then
              echo "Unsupported push ref: $REF_NAME" >&2
              exit 1
            fi
            TARGET_ENV="staging"
            SHOULD_SYNC="true"
            DRY_RUN="false"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$REF_NAME" != "main" ]; then
              echo "Manual syncs are only allowed from main. Current ref: $REF_NAME" >&2
              exit 1
            fi
            TARGET_ENV="${INPUT_ENV:-staging}"
            if [ "$TARGET_ENV" != "staging" ] && [ "$TARGET_ENV" != "production" ]; then
              echo "target_environment must be staging or production" >&2
              exit 1
            fi
            SHOULD_SYNC="true"
            DRY_RUN="$INPUT_DRY_RUN"
          else
            echo "Unsupported event: $EVENT_NAME" >&2
            exit 1
          fi

          echo "target_environment=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "should_sync=$SHOULD_SYNC" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

  sync:
    needs: resolve
    if: needs.resolve.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.target_environment }}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      PORT: ${{ vars.PORT }}
      VITE_FULLSTACK_PUBLIC_BASE_URL: ${{ vars.VITE_FULLSTACK_PUBLIC_BASE_URL }}
      VITE_FULLSTACK_APP_BASE_PATH: ${{ vars.VITE_FULLSTACK_APP_BASE_PATH }}
      VITE_FULLSTACK_API_BASE_URL: ${{ vars.VITE_FULLSTACK_API_BASE_URL }}
      VITE_FULLSTACK_AUTH_MODE: ${{ vars.VITE_FULLSTACK_AUTH_MODE }}
      VITE_FULLSTACK_TRUST_UPSTREAM_AUTH: ${{ vars.VITE_FULLSTACK_TRUST_UPSTREAM_AUTH }}
      VITE_FULLSTACK_SESSION_PROBE_PATH: ${{ vars.VITE_FULLSTACK_SESSION_PROBE_PATH }}
      VITE_ARKHAM_SIDECAR_ENABLED: ${{ vars.VITE_ARKHAM_SIDECAR_ENABLED }}
      VITE_ARKHAM_SIDECAR_BASE_URL: ${{ vars.VITE_ARKHAM_SIDECAR_BASE_URL }}
      VITE_ARKHAM_SIDECAR_HEALTH_PATH: ${{ vars.VITE_ARKHAM_SIDECAR_HEALTH_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate env values
        env:
          TARGET_ENV: ${{ needs.resolve.outputs.target_environment }}
        run: node scripts/validate-env.js --env "$TARGET_ENV"
      - name: Sync Render variables
        env:
          TARGET_ENV: ${{ needs.resolve.outputs.target_environment }}
          DRY_RUN: ${{ needs.resolve.outputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            node scripts/sync-render-env.js --env "$TARGET_ENV" --dry-run
          else
            node scripts/sync-render-env.js --env "$TARGET_ENV"
          fi
